# SN360 Desktop Agent — Standard Profile
#
# Adds EDR (process telemetry, local detection engine) and network
# telemetry to the basic hygiene modules. Suitable for SMEs with
# compliance requirements or those wanting deeper threat visibility.
#
# Memory footprint: ~20-30 MB resident.
# CPU: sub-0.1% idle, brief spikes during scans.
#
# To use: copy to /etc/sn360-desktop-agent/config.yaml or pass via
# --config flag.

server:
  address: "${SN360_GATEWAY_URL}"
  port: 1514
  protocol: "tcp"
  keepalive_interval: 600

enrollment:
  port: 1515
  auto_enroll: true

modules:
  fim:
    enabled: true
    scan_interval: 43200
    directories:
      - path: "/etc"
        recursive: true
        realtime: true
      - path: "/usr/bin"
        recursive: false
        check_sha256: true
      - path: "/usr/sbin"
        recursive: false
        check_sha256: true
      - path: "/home"
        recursive: true
        realtime: true
        ignore:
          - ".cache"
          - ".local/share/Trash"

  logcollector:
    enabled: true
    sources:
      - source_type: "journald"
        format: "syslog"
        units: ["sshd", "sudo", "systemd-logind", "audit"]

  inventory:
    enabled: true
    interval: 3600
    collect:
      - os
      - network
      - packages
      - hardware

  sca:
    enabled: true
    policy_dir: "/etc/sn360-desktop-agent/sca"
    scan_interval: 43200

  active_response:
    enabled: true
    timeout: 30
    actions:
      - block_ip
      - kill_process

  trds:
    enabled: true

  edr:
    enabled: true
    process_telemetry: true
    local_detection_engine: true

  network_telemetry:
    enabled: true
    dns_monitoring: true

  # Disabled in standard profile:
  host_isolation:
    enabled: false
  memory_scan:
    enabled: false
  identity_monitor:
    enabled: false
  dlp:
    enabled: false
  device_control:
    enabled: false
  desktop_mdm:
    enabled: false
  rootcheck:
    enabled: false
  enhanced_inventory:
    enabled: false

resource_limits:
  max_cpu_percent: 3
  max_memory_mb: 50
  battery_mode: adaptive
  idle_detection: true

logging:
  level: "info"
  format: "text"
