# SN360 Desktop Agent — Advanced Profile
#
# Full capability surface: EDR, DLP, identity monitoring, memory
# scanning, device control, desktop MDM, host isolation, and network
# telemetry. Suitable for regulated industries (healthcare, finance,
# government) and organisations with strict compliance requirements.
#
# Memory footprint: ~40-60 MB resident (peak during memory scans).
# CPU: sub-0.15% idle, periodic spikes during scans and sweeps.
#
# NOTE: paths and log sources below are Linux-specific.  For Windows
# or macOS deployments, adjust FIM directories, logcollector sources,
# and SCA policy_dir to match the target OS.  The agent's serde
# defaults handle platform-specific paths for fields you omit.
#
# To use: copy to /etc/sn360-desktop-agent/config.yaml or pass via
# --config flag.

server:
  address: "${SN360_GATEWAY_URL}"
  port: 1514
  protocol: "tcp"
  keepalive_interval: 600

enrollment:
  port: 1515
  auto_enroll: true

modules:
  fim:
    enabled: true
    scan_interval: 21600
    directories:
      - path: "/etc"
        recursive: true
        realtime: true
      - path: "/usr/bin"
        recursive: true
        check_sha256: true
      - path: "/usr/sbin"
        recursive: true
        check_sha256: true
      - path: "/home"
        recursive: true
        realtime: true
        exclude:
          - ".cache"
          - ".local/share/Trash"
      - path: "/var/log"
        recursive: false
        realtime: true

  logcollector:
    enabled: true
    sources:
      - source_type: "journald"
        format: "syslog"
        units: ["sshd", "sudo", "systemd-logind", "audit", "kernel"]

  inventory:
    enabled: true
    interval: 1800
    collect:
      - os
      - network
      - packages
      - hardware

  sca:
    enabled: true
    policy_dir: "/etc/sn360-desktop-agent/sca"
    scan_interval: 21600

  active_response:
    enabled: true
    timeout: 30
    actions:
      - block_ip
      - kill_process

  # EDR modules — process telemetry and local detection engine.
  process_monitor:
    enabled: true
  local_detection:
    enabled: true

  # Network telemetry modules.
  network_monitor:
    enabled: true
  dns_monitor:
    enabled: true

  host_isolation:
    enabled: true
    # REQUIRED: replace with your control-plane CIDR(s) so the agent
    # keeps management connectivity during isolation.  Without at
    # least one entry the module silently refuses IsolateHost jobs.
    control_plane_cidrs:
      - "${SN360_CONTROL_PLANE_CIDR}"

  memory_scanner:
    enabled: true
    scan_interval_secs: 3600

  identity_monitor:
    enabled: true

  dlp:
    enabled: true

  device_control:
    enabled: true

  mdm:
    enabled: true
    auto_remediate:
      disk_encryption: true
      firewall: true
      screen_lock: true
    recovery_key_escrow:
      enabled: true
    os_patch:
      enabled: true
      auto_install_security: true

  rootcheck:
    enabled: true
    scan_interval_secs: 43200

  enhanced_inventory:
    enabled: true
    running_software:
      enabled: true
    browser_extensions:
      enabled: true
    sbom:
      enabled: true

resource_limits:
  max_cpu_percent: 5
  max_memory_mb: 80
  battery_mode: adaptive
  idle_detection: true

logging:
  level: "info"
  format: "text"
