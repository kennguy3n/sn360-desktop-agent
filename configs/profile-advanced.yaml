# SN360 Desktop Agent — Advanced Profile
#
# Full capability surface: EDR, DLP, identity monitoring, memory
# scanning, device control, desktop MDM, host isolation, and network
# telemetry. Suitable for regulated industries (healthcare, finance,
# government) and organisations with strict compliance requirements.
#
# Memory footprint: ~40-60 MB resident (peak during memory scans).
# CPU: sub-0.15% idle, periodic spikes during scans and sweeps.
#
# To use: copy to /etc/sn360-desktop-agent/config.yaml or pass via
# --config flag.

server:
  address: "${SN360_GATEWAY_URL}"
  port: 1514
  protocol: "tcp"
  keepalive_interval: 600

enrollment:
  port: 1515
  auto_enroll: true

modules:
  fim:
    enabled: true
    scan_interval: 21600
    directories:
      - path: "/etc"
        recursive: true
        realtime: true
      - path: "/usr/bin"
        recursive: true
        check_sha256: true
      - path: "/usr/sbin"
        recursive: true
        check_sha256: true
      - path: "/home"
        recursive: true
        realtime: true
        ignore:
          - ".cache"
          - ".local/share/Trash"
      - path: "/var/log"
        recursive: false
        realtime: true

  logcollector:
    enabled: true
    sources:
      - source_type: "journald"
        format: "syslog"
        units: ["sshd", "sudo", "systemd-logind", "audit", "kernel"]

  inventory:
    enabled: true
    interval: 1800
    collect:
      - os
      - network
      - packages
      - hardware

  sca:
    enabled: true
    policy_dir: "/etc/sn360-desktop-agent/sca"
    scan_interval: 21600

  active_response:
    enabled: true
    timeout: 30
    actions:
      - block_ip
      - kill_process

  trds:
    enabled: true

  edr:
    enabled: true
    process_telemetry: true
    local_detection_engine: true

  network_telemetry:
    enabled: true
    dns_monitoring: true

  host_isolation:
    enabled: true

  memory_scan:
    enabled: true
    scan_interval: 3600

  identity_monitor:
    enabled: true

  dlp:
    enabled: true

  device_control:
    enabled: true

  desktop_mdm:
    enabled: true
    auto_remediation: true
    recovery_key_escrow: true
    os_patch_orchestration: true

  rootcheck:
    enabled: true
    scan_interval: 43200

  enhanced_inventory:
    enabled: true
    collect:
      - running_software
      - browser_extensions
      - sbom

resource_limits:
  max_cpu_percent: 5
  max_memory_mb: 80
  battery_mode: adaptive
  idle_detection: true

logging:
  level: "info"
  format: "text"
