# Cross-compilation configuration for the SN360 Desktop Agent.
# Use with `cross` (https://github.com/cross-rs/cross) to build for
# targets that are not natively available on the host.
#
# Supported targets:
#   x86_64-unknown-linux-gnu      — Linux x86_64 (glibc)
#   x86_64-unknown-linux-musl     — Linux x86_64 (static, musl)
#   aarch64-unknown-linux-gnu     — Linux ARM64
#   x86_64-apple-darwin           — macOS Intel
#   aarch64-apple-darwin          — macOS Apple Silicon
#   x86_64-pc-windows-msvc        — Windows x86_64

[target.x86_64-unknown-linux-gnu]

[target.x86_64-unknown-linux-musl]

[target.aarch64-unknown-linux-gnu]

[target.x86_64-apple-darwin]

[target.aarch64-apple-darwin]

[target.x86_64-pc-windows-msvc]
