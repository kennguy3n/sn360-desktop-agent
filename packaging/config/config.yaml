# SN360 Desktop Agent — default configuration installed by packages.
#
# See device-agent-proposal.md §11 for the complete configuration reference.

server:
  address: "wazuh-server.example.com"
  port: 1514
  protocol: "tcp"
  keepalive_interval: 600

enrollment:
  port: 1515
  auto_enroll: true

modules:
  fim:
    enabled: true
    scan_interval: 43200
    directories:
      - path: "/etc"
        recursive: true
        realtime: true
      - path: "/usr/bin"
        recursive: false
        check_sha256: true
      - path: "/usr/sbin"
        recursive: false
        check_sha256: true

  logcollector:
    enabled: true
    sources:
      - source_type: "journald"
        format: "syslog"
        units: ["sshd", "sudo", "systemd-logind"]

  inventory:
    enabled: true
    interval: 3600
    collect:
      - os
      - network
      - packages
      - hardware

  sca:
    enabled: true
    policy_dir: "/etc/sn360-desktop-agent/sca"
    scan_interval: 43200

  active_response:
    enabled: true
    timeout: 30
    actions:
      - block_ip
      - kill_process

  rootcheck:
    enabled: false

  enhanced_inventory:
    enabled: false

resource_limits:
  max_cpu_percent: 3
  max_memory_mb: 50
  battery_mode: adaptive
  idle_detection: true

logging:
  level: "info"
  format: "text"
