name: CI

# Lane model
# ---------
# Default lane (always runs):
#   * pr-gate (lint + unit tests)
# Full lane (opt-in):
#   * full-suite (integration + E2E)
#   * benchmark
# Triggers for the full lane:
#   1. push to main / develop                  - post-merge regression
#   2. workflow_dispatch w/ run_full_suite    - reviewer kicks it manually
#   3. PR labeled `ci:full`                    - reviewer opt-in per PR
# Branch protection should require only pr-gate; the full lane is
# expected to be slow and is reserved for changes that genuinely
# touch integration / E2E surface.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      run_full_suite:
        description: 'Run full test suite (integration + E2E)'
        type: boolean
        default: false
      run_benchmark:
        description: 'Run performance benchmark'
        type: boolean
        default: false

jobs:
  pr-gate:
    name: PR Gate (lint + unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libsystemd-dev build-essential
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: make lint
      - run: make test-unit

  full-suite:
    name: Full Test Suite
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_full_suite) ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'ci:full'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libsystemd-dev build-essential
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: make test-integration
      - run: make test-e2e-all

  benchmark:
    name: Performance Benchmark
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_benchmark) ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'ci:full'))
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      SDA_PROFILE: ci
      SDA_BIN: ${{ github.workspace }}/target/ci/sda-agent
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libsystemd-dev build-essential sysstat
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: make benchmark-ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: target/benchmark-regression/
