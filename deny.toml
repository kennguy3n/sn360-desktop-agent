# cargo-deny configuration for the SN360 Desktop Agent (SDA) workspace.
#
# This file is the operational enforcement of:
#
# - `docs/licensing.md` § 7.3 — SDA Device Control is a clean-room
#   functional re-implementation; no Fleet source code (MIT or EE) is
#   vendored, copied, or translated.
# - `docs/security.md` § 5 (License audit) — SDA ships under a
#   proprietary licence (`LicenseRef-Proprietary`); the workspace is
#   gated to permissive Rust-crate licences.
# - `docs/security.md` § 6.2 — per-engine licence posture for the
#   Device Control reference engines (Fleet MIT / Fleet EE /
#   MakeMeAdmin / SAP Privileges / Munki / Santa / MeshCentral /
#   Tactical RMM).
# - `docs/security.md` § 6.1 — clean-room EDR posture (no CrowdStrike
#   Falcon / SentinelOne Singularity / Microsoft Defender for
#   Endpoint source vendored, copied, or translated). All EDR PAL
#   implementations use vendor-documented public APIs only
#   (Linux `cn_proc` / netlink / audit / eBPF, Windows ETW providers,
#   macOS Endpoint Security framework). See `docs/licensing.md`
#   § 7.2 for the EDR-specific clean-room rationale and do-not-port
#   list.
#
# Run locally with:
#
#     cargo install --locked cargo-deny
#     cargo deny check licenses
#     cargo deny check bans
#     cargo deny check advisories
#     cargo deny check sources
#
# A `cargo deny check licenses` CI gate is planned for
# `.github/workflows/ci.yml`; this file already exists in the tree
# so the gate has something to enforce when it is wired in.

# ---------------------------------------------------------------------------
# Graph
# ---------------------------------------------------------------------------
# Check every target supported by SDA so a non-permissive licence cannot
# hide behind a `cfg(target_os = "...")` gate.
[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]
all-features = true

# ---------------------------------------------------------------------------
# Licences
# ---------------------------------------------------------------------------
# Mirrors the allow-list documented in `docs/security.md` § 5
# (License audit). Strong-copyleft and source-available licences
# (GPL / AGPL / LGPL / SSPL / BUSL / CC-BY-NC) are NOT in this list and
# must be replaced or feature-gated out of the default build.
#
# `LicenseRef-Proprietary` is SDA's own workspace crates — see
# `docs/licensing.md`.
[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "OpenSSL",
    "BSL-1.0",
    "LicenseRef-Proprietary",
]

# `r-efi` is consumed under `Apache-2.0 OR MIT` per the
# `docs/security.md` § 5 audit; the LGPL option is not taken.
[[licenses.exceptions]]
name = "r-efi"
allow = ["Apache-2.0", "MIT"]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

# ---------------------------------------------------------------------------
# Bans
# ---------------------------------------------------------------------------
# This block is the mechanical enforcement of the Device Control
# clean-room policy (`docs/licensing.md` § 7.3) and the Device Control
# per-engine licence posture (`docs/security.md` § 6.2). It denies any
# crate that could plausibly transitively pull Fleet EE code, Fleet
# `fleetd`/Orbit code, MakeMeAdmin source, or Tactical RMM source into
# the SDA workspace.
#
# These are name-pattern bans, not license bans — Rust crate names
# under these prefixes do not exist on crates.io today, but the bans
# exist so that if a future crate ever did appear (e.g. someone
# vendors Fleet EE under a `fleet-ee` crate name) the CI gate flags
# it before it can merge.
[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Disallowed crates — see comments above for rationale.
deny = [
    # Fleet (MIT) — barred as a source dependency per the clean-room
    # functional-port policy (`docs/licensing.md` § 7.3).
    { name = "fleet", reason = "Fleet source is barred from this repository per docs/licensing.md § 7.3 (clean-room functional port; no Fleet source vendored)." },
    { name = "fleetd", reason = "Fleet's fleetd / Orbit agent runtime is barred per docs/licensing.md § 7.3 (do-not-port list)." },
    { name = "fleet-orbit", reason = "Fleet's Orbit agent runtime is barred per docs/licensing.md § 7.3 (do-not-port list)." },

    # Fleet Enterprise Edition — proprietary; barred per clean-room policy.
    { name = "fleet-ee", reason = "Fleet EE source is barred from this repository per docs/licensing.md § 7.3 (Fleet EE licensing contamination)." },
    { name = "fleetdm-ee", reason = "Fleet EE source is barred per docs/licensing.md § 7.3." },

    # Tactical RMM — license restricts SaaS / commercial use; benchmark only.
    { name = "tacticalrmm", reason = "Tactical RMM is benchmark only per docs/device-control.md § 11 and docs/security.md § 6.2; its license restricts SaaS / commercial use." },
    { name = "tactical-rmm", reason = "Tactical RMM is benchmark only per docs/device-control.md § 11." },

    # MakeMeAdmin (GPL) — concept-only reference; SDA does not vendor or link.
    { name = "makemeadmin", reason = "MakeMeAdmin is GPL-licensed and is a concept-only reference per docs/security.md § 6.2; SDA does not vendor or link against MakeMeAdmin." },
    { name = "make-me-admin", reason = "MakeMeAdmin is GPL-licensed and is a concept-only reference per docs/security.md § 6.2." },
]

# ---------------------------------------------------------------------------
# Advisories
# ---------------------------------------------------------------------------
# RustSec is already enforced by the `cargo audit` job described in
# `docs/security.md` § 3 (Dependency audit). This block lets
# `cargo deny check advisories` mirror that posture for parity.
[advisories]
version = 2
yanked = "warn"
ignore = []

# ---------------------------------------------------------------------------
# Sources
# ---------------------------------------------------------------------------
# Restrict crate sources to crates.io. Git dependencies must be
# explicitly allow-listed here so a Fleet / Tactical RMM / MakeMeAdmin
# fork on GitHub cannot be pulled in via `[patch]` or a `git = "..."`
# dependency without an explicit, reviewable change to this file.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
